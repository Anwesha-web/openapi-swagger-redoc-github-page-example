openapi: 3.0.3

info:
  title: User Management API
  description: API for managing users in the system
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.mycompany.com/v1
    description: Production API server

security:
  - bearerAuth: []

tags:
  - name: Users
    description: Operations related to users

paths:

  /users:

    get:
      tags:
        - Users
      operationId: getUsers
      summary: Get all users
      description: Returns a list of users

      responses:

        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'

        '400':
          description: Bad request

    post:
      tags:
        - Users
      operationId: createUser
      summary: Create a new user

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'

      responses:

        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

        '400':
          description: Invalid input

  /users/{id}:

    get:
      tags:
        - Users
      operationId: getUserById
      summary: Get user by ID

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:

        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

        '404':
          description: User not found

    delete:
      tags:
        - Users
      operationId: deleteUser
      summary: Delete a user

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:

        '204':
          description: User deleted successfully

        '404':
          description: User not found

components:

  securitySchemes:

    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          example: john@example.com

    UserInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          example: john@example.com

    UserList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
